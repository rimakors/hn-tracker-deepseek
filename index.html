<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>HedgeNow · Asset Intelligence</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0c10;
            color: #e5e7eb;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .logo-icon {
            background: rgba(245, 158, 11, 0.1);
            padding: 0.75rem;
            border-radius: 12px;
        }
        
        .logo-icon i {
            font-size: 1.5rem;
            color: #f59e0b;
        }
        
        .title h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .title p {
            color: #6b7280;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }
        
        .update-badge {
            background: #1f2937;
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.85rem;
            color: #9ca3af;
            border: 1px solid #374151;
        }
        
        .update-badge i {
            color: #f59e0b;
            margin-right: 0.5rem;
        }
        
        /* Filter bar */
        .filter-bar {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }
        
        .filter-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .filter-btn {
            background: #1f2937;
            border: 1px solid #374151;
            color: #d1d5db;
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .filter-btn:hover {
            background: #2d3748;
            border-color: #4b5563;
        }
        
        .filter-btn.active {
            background: rgba(245, 158, 11, 0.15);
            border-color: #f59e0b;
            color: #fbbf24;
        }
        
        .filter-btn i {
            font-size: 0.8rem;
        }
        
        .info-note {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #1f2937;
            color: #6b7280;
            font-size: 0.8rem;
        }
        
        .info-note i {
            color: #f59e0b;
            margin-right: 0.25rem;
        }
        
        /* Table container */
        .table-container {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 1rem 1rem;
            background: #1a1f2e;
            color: #9ca3af;
            font-weight: 500;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        
        th:hover {
            background: #242b3d;
            color: #e5e7eb;
        }
        
        th i {
            margin-left: 0.5rem;
            font-size: 0.7rem;
            color: #6b7280;
        }
        
        th.active-sort i {
            color: #f59e0b;
        }
        
        td {
            padding: 1rem 1rem;
            border-bottom: 1px solid #1f2937;
            font-size: 0.9rem;
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        tbody tr {
            transition: all 0.2s;
            cursor: pointer;
        }
        
        tbody tr:hover {
            background: #1c2333;
        }
        
        .row-expanded {
            background: #1a1f2e !important;
            border-left: 3px solid #f59e0b;
        }
        
        .asset-name {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
        }
        
        .asset-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        /* Value colors */
        .text-positive {
            color: #10b981;
        }
        
        .text-warning {
            color: #f59e0b;
        }
        
        .text-danger {
            color: #ef4444;
        }
        
        .text-info {
            color: #3b82f6;
        }
        
        .text-muted {
            color: #6b7280;
        }
        
        .font-semibold {
            font-weight: 600;
        }
        
        /* Expanded row details */
        .expanded-content {
            background: #1a1f2e;
            padding: 1.5rem;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        
        .detail-section h4 {
            color: #9ca3af;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }
        
        .detail-section p {
            color: #e5e7eb;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        .meta-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .meta-tag {
            background: #1f2937;
            padding: 0.35rem 0.75rem;
            border-radius: 100px;
            font-size: 0.8rem;
            color: #d1d5db;
            border: 1px solid #374151;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .badge-positive {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .badge-negative {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .badge-neutral {
            background: rgba(107, 114, 128, 0.1);
            color: #9ca3af;
            border: 1px solid rgba(107, 114, 128, 0.2);
        }
        
        /* Footer */
        .footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            color: #4b5563;
            font-size: 0.8rem;
            padding-top: 1.5rem;
            border-top: 1px solid #1f2937;
        }
        
        .footer-links a {
            color: #6b7280;
            text-decoration: none;
            margin-left: 1rem;
        }
        
        .footer-links a:hover {
            color: #f59e0b;
        }
        
        .disclaimer {
            margin-top: 1rem;
            color: #374151;
            font-size: 0.7rem;
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #6b7280;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
    </style>
</head>

                },

                    minInvestment: "$1",
                    headline: "Similar profile to BTC; DeFi growth offset by 2022 scars.",
                    source: "CoinGecko",

                }
            ];

            // Helper functions
            function formatPercent(value) {
                if (value === undefined || value === null) return '—';
                return (value * 100).toFixed(1) + '%';
            }

            function formatDecimal(value, digits = 2) {
                if (value === undefined || value === null) return '—';
                return value.toFixed(digits);
            }

            function formatReturn(value) {
                if (value === undefined || value === null) return '—';
                if (value > 10) return value.toFixed(1) + 'x';
                return formatPercent(value);
            }

            function getValueClass(field, value) {
                if (field === 'sharpe') {
                    if (value > 1) return 'text-positive font-semibold';
                    if (value > 0) return 'text-positive';
                    if (value < -0.5) return 'text-danger';
                    if (value < 0) return 'text-warning';
                    return '';
                }
                if (field === 'maxDrawdown') {
                    if (value < 0.15) return 'text-positive font-semibold';
                    if (value < 0.25) return 'text-positive';
                    if (value > 0.5) return 'text-danger';
                    if (value > 0.35) return 'text-warning';
                    return '';
                }
                if (field.includes('Return') || field === 'ytd2026') {
                    if (value > 0.2) return 'text-positive';
                    if (value > 0.05) return 'text-positive';
                    if (value < 0) return 'text-danger';
                    return '';
                }
                return '';
            }

            // Filter options
            const filterOptions = [
                { value: 'all', label: 'All Assets', icon: 'fa-layer-group' },
                { value: 'crypto', label: 'Crypto', icon: 'fa-bitcoin' },
                { value: 'uae', label: 'UAE Real Estate', icon: 'fa-building' },
                { value: 'equity', label: 'Equities', icon: 'fa-chart-simple' },
                { value: 'commodity', label: 'Commodities', icon: 'fa-droplet' },
                { value: 'reit', label: 'REITs', icon: 'fa-warehouse' },
                { value: 'fixed', label: 'Fixed Income', icon: 'fa-coins' }
            ];

            // Sort dimensions
            const dimensions = [
                { key: 'sixYearReturn', label: '6Y Return', format: 'return' },
                { key: 'annualizedReturn', label: 'Ann. Return', format: 'percent' },
                { key: 'sharpe', label: 'Sharpe', format: 'decimal' },
                { key: 'maxDrawdown', label: 'Max DD (safest)', format: 'percent' },
                { key: 'ytd2026', label: '2026 YTD', format: 'percent' }
            ];

            // App state
            let state = {
                filterClass: 'all',
                sortBy: 'sharpe',
                sortAsc: false,
                expandedId: null
            };

            // Render function
            function renderApp() {
                const appEl = document.getElementById('app');
                
                // Filter data
                let filtered = state.filterClass === 'all' 
                    ? [...ASSET_DATA] 
                    : ASSET_DATA.filter(item => item.class === state.filterClass);
                
                // Sort data
                filtered.sort((a, b) => {
                    let aVal = a[state.sortBy];
                    let bVal = b[state.sortBy];
                    
                    if (state.sortBy === 'maxDrawdown') {
                        return state.sortAsc ? aVal - bVal : bVal - aVal;
                    } else {
                        return state.sortAsc ? aVal - bVal : bVal - aVal;
                    }
                });

                // Build HTML
                let html = `
                    <!-- Filter Bar -->
                    <div class="filter-bar">
                        <div class="filter-label">
                            <i class="fas fa-filter"></i>
                            <span>Asset Class:</span>
                        </div>
                        <div class="filter-buttons">
                `;

                // Filter buttons
                filterOptions.forEach(opt => {
                    html += `
                        <button class="filter-btn ${state.filterClass === opt.value ? 'active' : ''}" 
                                onclick="setFilter('${opt.value}')">
                            <i class="fas ${opt.icon}"></i>
                            ${opt.label}
                        </button>
                    `;
                });

                html += `
                        </div>
                        <div class="info-note">
                            <i class="fas fa-info-circle"></i> Click any row to expand details (liquidity, min investment, source)
                        </div>
                    </div>

                    <!-- Table -->
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Asset</th>
                `;

                // Table headers with sort
                dimensions.forEach(dim => {
                    const isActive = state.sortBy === dim.key;
                    const icon = isActive 
                        ? (state.sortAsc ? 'fa-sort-up' : 'fa-sort-down')
                        : 'fa-sort';
                    
                    html += `
                        <th onclick="setSort('${dim.key}')">
                            ${dim.label}
                            <i class="fas ${icon} ${isActive ? 'active-sort' : ''}"></i>
                        </th>
                    `;
                });

                html += `</tr></thead><tbody>`;

                // Table rows
                if (filtered.length === 0) {
                    html += `
                        <tr>
                            <td colspan="6">
                                <div class="empty-state">
                                    <i class="fas fa-database"></i>
                                    <p>No assets match the selected filter</p>
                                </div>
                            </td>
                        </tr>
                    `;
                } else {
                    filtered.forEach(item => {
                        const isExpanded = state.expandedId === item.id;
                        
                        html += `
                            <tr onclick="toggleRow(${item.id})" class="${isExpanded ? 'row-expanded' : ''}">
                                <td>
                                    <div class="asset-name">
                                        <span class="asset-dot" style="background: ${item.dotColor}"></span>
                                        ${item.asset}
                                    </div>
                                </td>
                                <td class="${getValueClass('sixYearReturn', item.sixYearReturn)}">${formatReturn(item.sixYearReturn)}</td>
                                <td class="${getValueClass('annualizedReturn', item.annualizedReturn)}">${formatPercent(item.annualizedReturn)}</td>
                                <td class="${getValueClass('sharpe', item.sharpe)}">${formatDecimal(item.sharpe)}</td>
                                <td class="${getValueClass('maxDrawdown', item.maxDrawdown)}">${formatPercent(item.maxDrawdown)}</td>
                                <td class="${getValueClass('ytd2026', item.ytd2026)}">${formatPercent(item.ytd2026)}</td>
                            </tr>
                        `;

                        // Expanded row
                        if (isExpanded) {
                            html += `
                                <tr>
                                    <td colspan="6" style="padding: 0;">
                                        <div class="expanded-content">
                                            <div class="detail-grid">
                                                <div class="detail-section">
                                                    <h4>Headline</h4>
                                                    <p>${item.headline}</p>
                                                    <div class="meta-tags">
                                                        <span class="meta-tag"><i class="fas fa-clock"></i> ${item.liquidity}</span>
                                                        <span class="meta-tag"><i class="fas fa-coins"></i> ${item.minInvestment}</span>
                                                    </div>
                                                </div>
                                                <div class="detail-section">
                                                    <h4>Data Source</h4>
                                                    <p>${item.source}</p>
                                                    <div style="margin-top: 1rem;">
                                                        <span class="badge ${item.sharpe > 0.5 ? 'badge-positive' : (item.sharpe < 0 ? 'badge-negative' : 'badge-neutral')}">
                                                            Sharpe: ${formatDecimal(item.sharpe)}
                                                        </span>
                                                        <span class="badge badge-neutral" style="margin-left: 0.5rem;">
                                                            YTD: ${formatPercent(item.ytd2026)}
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            `;
                        }
                    });
                }

                html += `
                            </tbody>
                        </table>
                    </div>

                    <!-- Footer -->
                    <div class="footer">
                        <div>
                            <i class="far fa-clock"></i> ${filtered.length} assets displayed · Rf: 4.25%
                        </div>
                        <div class="footer-links">
                            <a href="#"><i class="fab fa-linkedin"></i></a>

                `;

                appEl.innerHTML = html;
            }

            // Global functions for event handlers
            window.setFilter = function(value) {
                state.filterClass = value;
                state.expandedId = null;
                renderApp();
            };

            window.setSort = function(key) {
                if (state.sortBy === key) {
                    state.sortAsc = !state.sortAsc;
                } else {
                    state.sortBy = key;
                    state.sortAsc = (key === 'maxDrawdown'); // ascending for max drawdown (safest first)
                }
                renderApp();
            };

            window.toggleRow = function(id) {
                state.expandedId = state.expandedId === id ? null : id;
                renderApp();
            };

            // Initial render
            renderApp();
        })();
    </script>
