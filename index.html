// Helper functions for formatting
const formatPercent = (val) => {
  if (val === undefined || val === null) return '—';
  return new Intl.NumberFormat('en-US', { style: 'percent', minimumFractionDigits: 1, maximumFractionDigits: 1 }).format(val);
};

const formatDecimal = (val, digits = 2) => {
  if (val === undefined || val === null) return '—';
  return val.toFixed(digits);
};

const formatLargeReturn = (val) => {
  if (val === undefined || val === null) return '—';
  if (val > 10) return `${val.toFixed(1)}x`;
  return formatPercent(val);
};

const getSortIcon = (activeDim) => (dim) => {
  if (activeDim !== dim) return <i className="fas fa-sort text-gray-600 ml-1 text-xs"></i>;
  return <i className="fas fa-sort-down text-amber-400 ml-1"></i>;
};

// -------------------- MAIN COMPONENT --------------------
const HedgeNowTracker = () => {
  // State
  const [sortBy, setSortBy] = useState('sharpe'); // default: sharpe
  const [sortAsc, setSortAsc] = useState(false);
  const [filterClass, setFilterClass] = useState('all');
  const [expandedId, setExpandedId] = useState(null);
  
  // Dimensions available for sorting
  const dimensions = [
    { key: 'sixYearReturn', label: '6Y Return', format: 'largeReturn' },
    { key: 'annualizedReturn', label: 'Ann. Return', format: 'percent' },
    { key: 'sharpe', label: 'Sharpe', format: 'decimal2' },
    { key: 'maxDrawdown', label: 'Max DD (safest)', format: 'percent', reverseSense: true },
    { key: 'ytd2026', label: '2026 YTD', format: 'percent' }
  ];
  
  // Handle sort change
  const handleSort = (dim) => {
    if (sortBy === dim) {
      setSortAsc(!sortAsc);
    } else {
      setSortBy(dim);
      // Determine default direction
      const dimConfig = dimensions.find(d => d.key === dim);
      if (dimConfig?.reverseSense) {
        setSortAsc(true); // for max drawdown, ascending = smallest drawdown first (safest)
      } else {
        setSortAsc(false); // descending for others (best first)
      }
    }
  };
  
  // Filter and sort data
  const processedData = ASSET_DATA
    .filter(item => filterClass === 'all' || item.class === filterClass)
    .sort((a, b) => {
      let aVal = a[sortBy];
      let bVal = b[sortBy];
      
      // Handle special cases
      if (sortBy === 'maxDrawdown') {
        // For max drawdown, we want smallest (safest) first
        return sortAsc ? aVal - bVal : bVal - aVal;
      } else {
        // For returns, sharpe: we want largest first
        return sortAsc ? aVal - bVal : bVal - aVal;
      }
    });
  
  // Format cell based on dimension
  const formatCell = (item, dimKey) => {
    const val = item[dimKey];
    const dim = dimensions.find(d => d.key === dimKey);
    if (!dim) return val;
    
    switch(dim.format) {
      case 'percent':
        return formatPercent(val);
      case 'decimal2':
        return formatDecimal(val, 2);
      case 'largeReturn':
        return formatLargeReturn(val);
      default:
        return val;
    }
  };
  
  // Color coding for values
  const getValueColor = (dimKey, val) => {
    if (val === undefined || val === null) return 'text-gray-400';
    
    if (dimKey === 'sharpe') {
      if (val > 1) return 'text-emerald-400 font-semibold';
      if (val > 0) return 'text-emerald-300';
      if (val < -0.5) return 'text-red-400';
      if (val < 0) return 'text-orange-300';
      return 'text-gray-300';
    }
    
    if (dimKey === 'maxDrawdown') {
      if (val < 0.15) return 'text-emerald-400 font-semibold';
      if (val < 0.25) return 'text-emerald-300';
      if (val > 0.5) return 'text-red-400';
      if (val > 0.35) return 'text-orange-300';
      return 'text-gray-300';
    }
    
    if (dimKey.includes('Return') || dimKey === 'ytd2026') {
      if (val > 0.2) return 'text-emerald-400';
      if (val > 0.05) return 'text-emerald-300';
      if (val < 0) return 'text-red-400';
      return 'text-gray-300';
    }
    
    return 'text-gray-300';
  };
  
  return (
    <div className="min-h-screen bg-[#0b0f15] text-gray-200 p-4 md:p-6">
      {/* Header */}
      <div className="max-w-7xl mx-auto">
        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
          <div>
            <h1 className="text-3xl font-bold text-white flex items-center gap-3">
              <span className="bg-amber-500/20 p-2 rounded-lg">
                <i className="fas fa-chart-line text-amber-400"></i>
              </span>
              HedgeNow Data Library
            </h1>
            <p className="text-gray-400 mt-1 text-sm">
              Institutional-grade alternative asset intelligence · Updated March 2026
            </p>
          </div>
          <div className="mt-3 md:mt-0 flex items-center gap-2">
            <span className="text-xs bg-gray-800 px-3 py-1.5 rounded-full text-gray-300">
              <i className="far fa-calendar-alt mr-1"></i> Last update: Mar 12, 2026
            </span>
          </div>
        </div>
        
        {/* Filters */}
        <div className="bg-gray-900/60 border border-gray-800 rounded-xl p-4 mb-6">
          <div className="flex flex-wrap items-center gap-4">
            <div className="flex items-center gap-2">
              <i className="fas fa-filter text-gray-500 text-sm"></i>
              <span className="text-sm font-medium text-gray-300">Asset Class:</span>
            </div>
            <div className="flex flex-wrap gap-2">
              {[
                { value: 'all', label: 'All Assets', icon: 'fa-layer-group' },
                { value: 'crypto', label: 'Crypto', icon: 'fa-bitcoin' },
                { value: 'uae', label: 'UAE Real Estate', icon: 'fa-building' },

                { value: 'commodity', label: 'Commodities', icon: 'fa-droplet' },
                { value: 'reit', label: 'REITs', icon: 'fa-warehouse' },
                { value: 'fixed', label: 'Fixed Income', icon: 'fa-coins' }
              ].map(cls => (
                <button
                  key={cls.value}
                  onClick={() => setFilterClass(cls.value)}
                  className={`px-3 py-1.5 rounded-full text-xs font-medium flex items-center gap-1.5 transition ${

                      : 'bg-gray-800 text-gray-400 hover:bg-gray-700 border border-transparent'

                >
                  <i className={`fas ${cls.icon} ${filterClass === cls.value ? 'text-amber-400' : 'text-gray-500'}`}></i>
                  {cls.label}

              ))}

          <div className="text-xs text-gray-500 mt-3 border-t border-gray-800 pt-3">

                </tr>
              </thead>
              <tbody className="divide-y divide-gray-800">
                {processedData.map(item => (
                  <>
                    <tr 
                      key={item.id}
                      onClick={() => setExpandedId(expandedId === item.id ? null : item.id)}
                      className={`hover-highlight border-l-2 border-l-transparent hover:border-l-amber-500 transition ${
                        expandedId === item.id ? 'expanded-row border-l-amber-500' : ''
                      }`}
                    >
                      <td className="px-4 py-3 font-medium">

                      </td>
                      <td className={`px-4 py-3 ${getValueColor('sixYearReturn', item.sixYearReturn)}`}>
                        {formatLargeReturn(item.sixYearReturn)}
                      </td>
                      <td className={`px-4 py-3 ${getValueColor('annualizedReturn', item.annualizedReturn)}`}>
                        {formatPercent(item.annualizedReturn)}
                      </td>
                      <td className={`px-4 py-3 ${getValueColor('sharpe', item.sharpe)}`}>
                        {formatDecimal(item.sharpe, 2)}
                      </td>
                      <td className={`px-4 py-3 ${getValueColor('maxDrawdown', item.maxDrawdown)}`}>
                        {formatPercent(item.maxDrawdown)}
                      </td>
                      <td className={`px-4 py-3 ${getValueColor('ytd2026', item.ytd2026)}`}>
                        {formatPercent(item.ytd2026)}
                      </td>
                    </tr>
                    
                    {/* Expanded row */}
                    {expandedId === item.id && (
                      <tr className="bg-gray-800/40">
                        <td colSpan="6" className="px-4 py-4">
                          <div className="grid md:grid-cols-2 gap-4">
                            <div>
                              <h4 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Headline</h4>
                              <p className="text-sm text-gray-200">{item.headline}</p>
                              
                              <div className="mt-3 flex flex-wrap gap-4">
                                <div>
                                  <span className="text-xs text-gray-500 block">Liquidity</span>
                                  <span className="text-sm font-medium">{item.liquidity}</span>
                                </div>
                                <div>
                                  <span className="text-xs text-gray-500 block">Min Investment</span>
                                  <span className="text-sm font-medium">{item.minInvestment}</span>
                                </div>
                              </div>
                            </div>
                            <div>
                              <h4 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Data Source</h4>
                              <p className="text-sm text-gray-300 mb-3">{item.source}</p>
                              
                              <div className="flex items-center gap-2">
                                <span className={`badge-${item.sharpe > 0.5 ? 'positive' : item.sharpe < 0 ? 'negative' : 'neutral'}`}>
                                  Sharpe: {formatDecimal(item.sharpe, 2)}
                                </span>
                                <span className="badge-neutral">
                                  YTD: {formatPercent(item.ytd2026)}
                                </span>
                              </div>
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}
                  </>
                ))}
              </tbody>
            </table>
          </div>
          
          {processedData.length === 0 && (
            <div className="p-8 text-center text-gray-500">
              <i className="fas fa-database text-4xl mb-3 opacity-30"></i>
              <p>No assets match the selected filter</p>
            </div>
          )}
          
          {/* Footer summary */}
          <div className="bg-gray-800/30 px-4 py-3 text-xs text-gray-500 border-t border-gray-800 flex flex-wrap justify-between items-center">
            <span><i className="far fa-clock mr-1"></i> {processedData.length} assets displayed</span>
            <span className="text-amber-400/70">*Risk-free rate: 4.25% (10Y Treasury)</span>
          </div>
        </div>
        
        {/* Methodology & disclaimer */}
        <div className="mt-8 text-xs text-gray-600 border-t border-gray-800 pt-6">
          <div className="flex flex-wrap gap-6 justify-between">
            <div>
              <span className="font-medium text-gray-400">Methodology:</span> Sharpe = (Return - Rf) / Vol · Max DD = peak-to-trough · 6Y = Nov 2019–Mar 2026
            </div>
            <div>
              <span className="text-gray-500">© 2026 HedgeNow · </span>
              <a href="#" className="text-amber-400/70 hover:text-amber-400">Terms</a>
              <span className="text-gray-600 mx-2">·</span>
              <a href="#" className="text-amber-400/70 hover:text-amber-400">Data sources</a>
            </div>
          </div>
          <div className="mt-3 text-gray-700">
            <i className="fas fa-exclamation-triangle mr-1 text-xs"></i> 
            DISCLAIMER: For informational purposes only. Past performance does not guarantee future results.
          </div>
        </div>
      </div>

};
